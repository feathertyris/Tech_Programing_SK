services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: timp_database
      POSTGRES_USER: timp_user
      POSTGRES_PASSWORD: timp123
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: qt_server
    ports:
      - "33333:33333"
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: timp_database
      POSTGRES_USER: timp_user
      POSTGRES_PASSWORD: timp123